standard: KnC

vehicle:
  mass: 300.0
  h_cg: 0.28
  track_front: 1.20
  track_rear: 1.20
  wheelbase: 1.5494

suspension:
  front:
    spring_rate: 30000.0      # N/m at spring
    arb_rate: 750.0          # Nm/rad bar torsional rate
  rear:
    spring_rate: 28000.0
    arb_rate: 1200.0

simulation:
  solver: dassl
  output_format: csv
  no_grid: false
  log_level: LOG_STATS,LOG_SOLVER,LOG_INIT
  stepSize: 0.05

execution:
  parallel: false

procedure:
  steerMagnitude: 0.0
  heaveMagnitude: 0.03
  rollMagnitude: 0.035
  forceMagnitude: 1000

report:
  brand: BobSim
  title: Suspension Kinematics and Compliance (KnC) Characterization
  subtitle: Heave and Roll Sweeps
  output_path: _3_StandardSim/KnC/results/report.pdf
  notes:
    - "These results include heave and roll sweeps to evaluate key suspension parameters such as camber, toe, caster, KPI, trail, scrub, motion ratio, and jacking characteristics."

plots:

  # ============================================================
  # HEAVE SWEEP
  # ============================================================

  camber_heave:
    layout: quad
    title: "Camber vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: fr_l_camber_vs_heave, scale: -57.2958, label: "Camber (deg)" } }
      - { title: "Front Right", x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: fr_r_camber_vs_heave, scale: 57.2958, label: "Camber (deg)" } }
      - { title: "Rear Left",   x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: rr_l_camber_vs_heave, scale: -57.2958, label: "Camber (deg)" } }
      - { title: "Rear Right",  x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: rr_r_camber_vs_heave, scale: 57.2958, label: "Camber (deg)" } }

  toe_heave:
    layout: quad
    title: "Toe vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: fr_l_toe_vs_heave, scale: -57.2958, label: "Toe (deg)" } }
      - { title: "Front Right", x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: fr_r_toe_vs_heave, scale: 57.2958, label: "Toe (deg)" } }
      - { title: "Rear Left",   x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: rr_l_toe_vs_heave, scale: -57.2958, label: "Toe (deg)" } }
      - { title: "Rear Right",  x: { key: heave, scale: 1000, label: "Heave (mm)" }, y: { key: rr_r_toe_vs_heave, scale: 57.2958, label: "Toe (deg)" } }

  caster_heave:
    layout: quad
    title: "Caster vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: heave, scale: 1000 }, y: { key: fr_l_caster_vs_heave, scale: 57.2958, label: "Caster (deg)" } }
      - { title: "Front Right", x: { key: heave, scale: 1000 }, y: { key: fr_r_caster_vs_heave, scale: 57.2958 } }
      - { title: "Rear Left",   x: { key: heave, scale: 1000 }, y: { key: rr_l_caster_vs_heave, scale: 57.2958 } }
      - { title: "Rear Right",  x: { key: heave, scale: 1000 }, y: { key: rr_r_caster_vs_heave, scale: 57.2958 } }

  kpi_heave:
    layout: quad
    title: "KPI vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: heave, scale: 1000 }, y: { key: fr_l_kpi_vs_heave, scale: 57.2958, label: "KPI (deg)" } }
      - { title: "Front Right", x: { key: heave, scale: 1000 }, y: { key: fr_r_kpi_vs_heave, scale: 57.2958 } }
      - { title: "Rear Left",   x: { key: heave, scale: 1000 }, y: { key: rr_l_kpi_vs_heave, scale: 57.2958 } }
      - { title: "Rear Right",  x: { key: heave, scale: 1000 }, y: { key: rr_r_kpi_vs_heave, scale: 57.2958 } }

  trail_heave:
    layout: quad
    title: "Mechanical Trail vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: heave, scale: 1000 }, y: { key: fr_l_trail_vs_heave, scale: 1000, label: "Trail (mm)" } }
      - { title: "Front Right", x: { key: heave, scale: 1000 }, y: { key: fr_r_trail_vs_heave, scale: 1000 } }
      - { title: "Rear Left",   x: { key: heave, scale: 1000 }, y: { key: rr_l_trail_vs_heave, scale: 1000 } }
      - { title: "Rear Right",  x: { key: heave, scale: 1000 }, y: { key: rr_r_trail_vs_heave, scale: 1000 } }

  scrub_heave:
    layout: quad
    title: "Mechanical Scrub vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: heave, scale: 1000 }, y: { key: fr_l_scrub_vs_heave, scale: 1000, label: "Scrub (mm)" } }
      - { title: "Front Right", x: { key: heave, scale: 1000 }, y: { key: fr_r_scrub_vs_heave, scale: 1000 } }
      - { title: "Rear Left",   x: { key: heave, scale: 1000 }, y: { key: rr_l_scrub_vs_heave, scale: 1000 } }
      - { title: "Rear Right",  x: { key: heave, scale: 1000 }, y: { key: rr_r_scrub_vs_heave, scale: 1000 } }

  motion_ratio:
    layout: quad
    title: "Motion Ratio vs Heave"
    subplots:
      - { title: "Front Left",  x: { key: fr_l_motion_ratio_x, scale: 1000, label: "Heave (mm)" }, y: { key: fr_l_motion_ratio_vs_heave, label: "MR (wheel/spring)" } }
      - { title: "Front Right", x: { key: fr_r_motion_ratio_x, scale: 1000, label: "Heave (mm)" }, y: { key: fr_r_motion_ratio_vs_heave, label: "MR (wheel/spring)" } }
      - { title: "Rear Left",   x: { key: rr_l_motion_ratio_x, scale: 1000, label: "Heave (mm)" }, y: { key: rr_l_motion_ratio_vs_heave, label: "MR (wheel/spring)" } }
      - { title: "Rear Right",  x: { key: rr_r_motion_ratio_x, scale: 1000, label: "Heave (mm)" }, y: { key: rr_r_motion_ratio_vs_heave, label: "MR (wheel/spring)" } }
  
  jacking_heave:
    layout: dual
    title: "Anti vs Heave"
    subplots:
      - {
          title: "Front",
          x: { key: fr_jacking_vs_heave_x, scale: 1000, label: "Heave (mm)" },
          y: { key: fr_anti_vs_heave, label: "Geometric Anti-Dive (%)" },
          reference: { type: horizontal, y: 100.0, label: "100% Anti ($h_{cg}/L$)" }
        }

      - {
          title: "Rear",
          x: { key: rr_jacking_vs_heave_x, scale: 1000, label: "Heave (mm)" },
          y: { key: rr_anti_vs_heave, label: "Geometric Anti-Squat (%)" },
          reference: { type: horizontal, y: 100.0, label: "100% Anti ($h_{cg}/L$)" }
        }
        
  # ============================================================
  # ROLL SWEEP (NOW COMPLETE)
  # ============================================================

  camber_roll:
    layout: quad
    title: "Camber vs Roll"
    subplots:
      - { title: "Front Left",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_l_camber_vs_roll, scale: -57.2958, label: "Camber (deg)" } }
      - { title: "Front Right", x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_r_camber_vs_roll, scale: 57.2958, label: "Camber (deg)" } }
      - { title: "Rear Left",   x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_l_camber_vs_roll, scale: -57.2958, label: "Camber (deg)" } }
      - { title: "Rear Right",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_r_camber_vs_roll, scale: 57.2958, label: "Camber (deg)" } }

  toe_roll:
    layout: quad
    title: "Toe vs Roll"
    subplots:
      - { title: "Front Left",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_l_toe_vs_roll, scale: -57.2958, label: "Toe (deg)" } }
      - { title: "Front Right", x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_r_toe_vs_roll, scale: 57.2958, label: "Toe (deg)" } }
      - { title: "Rear Left",   x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_l_toe_vs_roll, scale: -57.2958, label: "Toe (deg)" } }
      - { title: "Rear Right",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_r_toe_vs_roll, scale: 57.2958, label: "Toe (deg)" } }

  caster_roll:
    layout: quad
    title: "Caster vs Roll"
    subplots:
      - { title: "Front Left",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_l_caster_vs_roll, scale: 57.2958, label: "Caster (deg)" } }
      - { title: "Front Right", x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_r_caster_vs_roll, scale: 57.2958, label: "Caster (deg)" } }
      - { title: "Rear Left",   x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_l_caster_vs_roll, scale: 57.2958, label: "Caster (deg)" } }
      - { title: "Rear Right",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_r_caster_vs_roll, scale: 57.2958, label: "Caster (deg)" } }

  kpi_roll:
    layout: quad
    title: "KPI vs Roll"
    subplots:
      - { title: "Front Left",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_l_kpi_vs_roll, scale: 57.2958, label: "KPI (deg)" } }
      - { title: "Front Right", x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_r_kpi_vs_roll, scale: 57.2958, label: "KPI (deg)" } }
      - { title: "Rear Left",   x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_l_kpi_vs_roll, scale: 57.2958, label: "KPI (deg)" } }
      - { title: "Rear Right",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_r_kpi_vs_roll, scale: 57.2958, label: "KPI (deg)" } }

  trail_roll:
    layout: quad
    title: "Mechanical Trail vs Roll"
    subplots:
      - { title: "Front Left",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_l_trail_vs_roll, scale: 1000, label: "Trail (mm)" } }
      - { title: "Front Right", x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_r_trail_vs_roll, scale: 1000, label: "Trail (mm)" } }
      - { title: "Rear Left",   x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_l_trail_vs_roll, scale: 1000, label: "Trail (mm)" } }
      - { title: "Rear Right",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_r_trail_vs_roll, scale: 1000, label: "Trail (mm)" } }

  scrub_roll:
    layout: quad
    title: "Mechanical Scrub vs Roll"
    subplots:
      - { title: "Front Left",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_l_scrub_vs_roll, scale: 1000, label: "Scrub (mm)" } }
      - { title: "Front Right", x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_r_scrub_vs_roll, scale: 1000, label: "Scrub (mm)" } }
      - { title: "Rear Left",   x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_l_scrub_vs_roll, scale: 1000, label: "Scrub (mm)" } }
      - { title: "Rear Right",  x: { key: roll, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_r_scrub_vs_roll, scale: 1000, label: "Scrub (mm)" } }

  stabar_motion_ratio:
    layout: dual
    title: "Stabar Motion Ratio vs Roll"
    subplots:
      - { title: "Front", x: { key: fr_stabar_motion_ratio_x, scale: 57.2958, label: "Roll (deg)" }, y: { key: fr_stabar_motion_ratio_vs_roll, label: "MR (roll/stabar)" } }
      - { title: "Rear",  x: { key: rr_stabar_motion_ratio_x, scale: 57.2958, label: "Roll (deg)" }, y: { key: rr_stabar_motion_ratio_vs_roll, label: "MR (roll/stabar)" } }
  
  jacking_roll:
    layout: dual
    title: "Geometric Anti-Roll vs Roll"
    subplots:
      - {
          title: "Front",
          x: { key: fr_jacking_vs_roll_x, scale: 57.2958, label: "Roll (deg)" },
          y: { key: fr_anti_vs_roll, label: "Geometric Anti-Roll (%)" },
          reference: { type: horizontal, y: 100.0, label: "100% Anti ($h_{cg}/T$)" }
        }

      - {
          title: "Rear",
          x: { key: rr_jacking_vs_roll_x, scale: 57.2958, label: "Roll (deg)" },
          y: { key: rr_anti_vs_roll, label: "Geometric Anti-Roll (%)" },
          reference: { type: horizontal, y: 100.0, label: "100% Anti ($h_{cg}/T$)" }
        }
  
  anti_balance_roll:
    layout: single
    title: "Anti Balance vs Roll"
    x: { key: anti_balance_vs_roll_x, scale: 57.2958, label: "Roll (deg)" }
    y: { key: anti_balance_vs_roll, label: "Anti Balance (Front / Rear)" }
    reference:
      - { type: horizontal, y: 1.0, label: "Neutral (Fr = Rr)" }
      - { type: horizontal, y: 1.2, color: "red", label: "Front Dominant (Understeer)" }
      - { type: horizontal, y: 0.8, color: "green", label: "Rear Dominant (Oversteer)" }
  
  lltd_roll:
    layout: single
    title: "LLTD vs Roll"
    x: { key: lltd_vs_roll_x, scale: 57.2958, label: "Roll (deg)" }
    y: { key: lltd_vs_roll, scale: 100.0, label: "LLTD Front (%)" }
    reference:
      - { type: horizontal, y: 50.0, label: "Neutral (50/50)" }
      - { type: horizontal, y: 60.0, color: "red", label: "Front Biased" }
      - { type: horizontal, y: 40.0, color: "green", label: "Rear Biased" }