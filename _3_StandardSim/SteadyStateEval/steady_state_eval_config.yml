standard: SteadyStateEval

simulation:
  backend: modelica
  build_dir: _3_StandardSim/Build
  exec_name: BobLib.Standards.VehicleSim

  start_time: 0.5
  stop_time: 10.0
  solver: dassl
  output_format: csv

  log_level: LOG_STATS

  no_grid: true
  no_event_emit: true

  # Optional explicit Modelica overrides. Here for transparency but currently redundant
  init_parameters:
    useMode: 0

    curvatureGain: 3.2
    curvatureTi: 0.04
    ayRampDuration: 1.5
    ayErrorTol: 0.01
    steadyHoldDuration: 0.15

    velGain: 200.0
    velTi: 1.0

execution:
  parallel: true
  max_workers: 8
  cleanup: true
  stream_logs: false

sweep:
  testVel: 15.0
  n_cases: 10
  r_min: 12.5
  r_max: 100.0
  radius_bias_power: 2.5

fit:
  ay_linear_max: 6.0

report:
  enabled: true
  brand: BobSim
  title: SteadyStateEval Vehicle Characterization
  subtitle: OpenModelica Executable with Curvature Feedforward and PI Trim
  output_path: _3_StandardSim/results/steady_state_eval_report.pdf

  notes:
    - SteadyStateEval steady-state circular test performed
    - Constant velocity maintained at 15 m/s
    - Radius sweep from 12.5 m to 100 m
    - Tire model: MF52
    - Configuration: baseline_v3
    - Backend: OpenModelica executable
    - Curvature controller follows the BobLib radius-controller pattern
    - Gain-scheduled steer-ratio feedforward drives the majority of the command
    - A curvature PI trim loop closes the remaining tracking error
    - Steady-state metrics average the final settled time window
    - Ay tracking error is plotted against analytical signed Ay

plots:
  roadwheel:
    layout: dual
    title: "Steering Angle vs $a_y$"

    subplots:

      - title: "Roadwheel Angle $\\delta$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: roadwheel, label: "$\\delta$ (deg)", scale: 57.3 }

      - title: "Handwheel Angle $\\delta_{sw}$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: handwheel, label: "$\\delta_{sw}$ (deg)", scale: 57.3 }
  tracking_errors:
    layout: dual
    title: "Tracking Error vs Analytical $a_y$"

    subplots:

      - title: "Ay Tracking Error"
        style: scatter
        x: { key: ay_analytical, label: "Analytical $a_y$ $(m/s^2)$" }
        y: { key: ay_error_pct, label: "$\\Delta a_y / a_{y,analytical} \\times 100$ (%)" }

      - title: "Radius Tracking Error"
        style: scatter
        x: { key: ay_analytical, label: "Analytical $a_y$ $(m/s^2)$" }
        y: { key: radius_error_pct, label: "$\\Delta r / r_{cmd} \\times 100$ (%)" }

  vehicle_states:
    layout: triple
    title: "Vehicle States vs $a_y$"

    subplots:

      - title: "Curvature $\\kappa$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: curvature, label: "$\\kappa$ (1/m)" }

      - title: "Roll Angle $\\phi$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: roll, label: "$\\phi$ (rad)" }

      - title: "Sideslip $\\beta$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: sideslip, label: "$\\beta$ (rad)" }

  sensitivities:
    layout: triple
    title: "Response Sensitivities vs $a_y$"

    subplots:

      - title: "$d\\kappa/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: curvature_gradient, label: "$d\\kappa/da_y$" }

      - title: "$d\\phi/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: roll_gradient, label: "$d\\phi/da_y$" }

      - title: "$d\\beta/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: sideslip_gradient, label: "$d\\beta/da_y$" }

  steering_effort:
    layout: dual
    title: "Steering Effort and Sensitivity vs $a_y$"

    subplots:

      - title: "Steering Torque $T_{sw}$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: torque, label: "$T_{sw}$ (Nm)" }

      - title: "Steering Sensitivity $d\\delta/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: steer_gradient, label: "$d\\delta/da_y$" }
