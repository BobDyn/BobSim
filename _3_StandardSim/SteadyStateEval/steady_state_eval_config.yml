standard: SteadyStateEval

simulation:
  backend: modelica
  build_dir: _3_StandardSim/Build
  exec_name: BobLib.Standards.VehicleSim

  start_time: 0.0
  stop_time: 20.0
  solver: dassl
  tolerance: 1e-6
  output_format: csv

  log_level: LOG_STATS

  no_grid: true
  no_event_emit: true

  # Explicit Modelica overrides used by SteadyStateEval.
  init_parameters:
    useMode: 0
    steerStart: 2.0
    ayRampDuration: 7.0
    steadyHoldDuration: 0.1
    handwheelRateTol: 0.01
    settleTimeout: 3.0

    # Longitudinal velocity controller
    velGain: 200.0
    velTi: 1.0

execution:
  parallel: true
  max_workers: 8
  cleanup: true
  stream_logs: false

sweep:
  # Velocity isolines used for the open-loop ramp-steer characterization.
  testVels: [12.5, 15.0, 17.5, 20.0]

  # Signed ramps are generated from 0 -> +maxAy and 0 -> -maxAy.
  maxAy: 18.0

fit:
  # Linear-region bound used for reported understeer/gradient fits.
  ay_linear_max: 4.0
  # Exclude the low-|measured a_y| region before analysis.
  ay_min_magnitude: 1.0
  # Robust prefilter applied before the smoothing spline fit.
  hampel_window: 100
  hampel_nsigmas: 1.0
  # Keep the spline as close to the cleaned samples as possible after outlier rejection.
  spline_smoothing_fraction: 0.0

report:
  enabled: true
  brand: BobSim
  title: SteadyStateEval Vehicle Characterization
  subtitle: Measured-$a_y$ ramp-steer isolines with robust fits
  output_path: _3_StandardSim/results/steady_state_eval_report.pdf

  # CSV metrics are exported from the velocity nearest this target.
  metric_target_velocity_mps: 15.0

  sensitivity_cutoff_fraction: 0.9

  notes:
    - "Open-loop ramp-steer at 12.5, 15, 17.5, and 20 m/s"
    - "steerStart = 2.0 s; trim all pre-ramp samples"
    - "Measured $a_y$ is the analysis axis; commanded $a_y$ only sets the ramp"
    - "|measured $a_y$| < 1.0 m/s^2 is excluded; linear band = 1.0 to 4.0 m/s^2"
    - "Understeer gradient = mean d(delta_excess)/d(a_y) over the linear band"
    - "Response curves use split Hampel-filtered spline fits; sensitivities trim the outer 20% of |measured $a_y$|"
    - "steerExcess = avgSteerAngle - wheelbase * curvature"
    - "Tire/config: MF52, baseline_v3; Backend: OpenModelica"


