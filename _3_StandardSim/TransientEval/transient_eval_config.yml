standard: TransientEval

simulation:
  backend: modelica
  build_dir: _3_StandardSim/Build
  exec_name: BobLib.Standards.VehicleSim
  
  start_time: 0.0
  solver: dassl
  output_format: csv
  
  log_level: LOG_STATS
  
  no_grid: true
  no_event_emit: true

execution:
  parallel: true
  max_workers: 8
  cleanup: true
  stream_logs: false

test:
  # Scalar or list of velocities; multiple values render as isolines.
  testVel: [15.0, 20.0]
  stepTime: 1.0

  run_step: true
  run_continuous_sine: true

  directions: [left]

  # Representative step steer case.
  representative_step_deg: 5.0
  representative_step_direction: left
  steerStep_deg: [5.0]
  stepDuration: 0.02

  representative_cont_freq_hz: 1.0
  representative_cont_amp_deg: 5.0
  representative_cont_direction: left
  sweep_freq_hz: [0.5, 0.75, 1.0]
  sweep_amp_deg: [5.0]
  n_cycles: 4
  analyze_cycles_after: 1

  freq_response_amp_deg: 5.0
  freq_response_direction: left

report:
  enabled: true
  brand: BobSim
  title: TransientEval Lateral Transient Response
  subtitle: Step response and sustained-sine FRF
  output_path: _3_StandardSim/results/transient_eval_report.pdf
  metric_target_velocity_mps: 15.0

  notes:
    - Representative step steer response
    - Continuous sinusoidal responses
    - Rise time uses 50 percent input to 90 percent response thresholds
    - Frequency delays are reported at 0.5 Hz and 1.0 Hz
    - Gain and phase slopes summarize the FRF trend
    - Steering shown in degrees for readability

plots:
  step_response:
    layout: triple
    title: "Step Steer Response (TransientEval)"

    subplots:
      - title: "Steering Wheel Angle $\\delta_H$"
        x: { key: step_time, label: "Time [s]" }
        y: { key: step_steer, label: "$\\delta_{HWA}$ [deg]", scale: 57.3 }

      - title: "Lateral Acceleration $a_y$"
        x: { key: step_time, label: "Time [s]" }
        y: { key: step_ay, label: "$a_y$ [$\\mathrm{m/s^2}$]" }

      - title: "Yaw Velocity $r$"
        x: { key: step_time, label: "Time [s]" }
        y: { key: step_yaw, label: "$r$ [rad/s]" }

  sine_five_period:
    layout: triple
    title: "Continuous Sinusoidal Response"

    subplots:
      - title: "Steering Wheel Angle $\\delta_H$"
        x: { key: cont_time, label: "Time [s]" }
        y: { key: cont_steer, label: "$\\delta_{HWA}$ [deg]", scale: 57.3 }

      - title: "Lateral Acceleration $a_y$"
        x: { key: cont_time, label: "Time [s]" }
        y: { key: cont_ay, label: "$a_y$ [$\\mathrm{m/s^2}$]" }

      - title: "Yaw Velocity $r$"
        x: { key: cont_time, label: "Time [s]" }
        y: { key: cont_yaw, label: "$r$ [rad/s]" }

  freq_response_gain:
    layout: dual
    title: "Frequency Response — Gain (TransientEval)"
    xscale: log

    subplots:
      - title: "$|a_y / \\delta_{HWA}|$"
        x: { key: freq, label: "$f$ [Hz]" }
        y: { key: ay_gain, label: "$|a_y / \\delta_{HWA}|$ [$\\frac{\\mathrm{m/s^2}}{\\mathrm{rad}}$]" }

      - title: "$|r / \\delta_{HWA}|$"
        x: { key: freq, label: "$f$ [Hz]" }
        y: { key: yaw_gain, label: "$|r / \\delta_{HWA}|$ [(rad/s)/rad]" }

  freq_response_phase:
    layout: dual
    title: "Frequency Response — Phase (TransientEval)"
    xscale: log

    subplots:
      - title: "Phase: $a_y$ vs $\\delta_{HWA}$"
        x: { key: freq, label: "$f$ [Hz]" }
        y: { key: ay_phase, label: "Phase [deg]" }

      - title: "Phase: $r$ vs $\\delta_{HWA}$"
        x: { key: freq, label: "$f$ [Hz]" }
        y: { key: yaw_phase, label: "Phase [deg]" }
