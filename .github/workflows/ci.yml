name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check DOE/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: pip install mypy -r requirements.txt

      - name: Run mypy
        run: |
          mypy \
            DOE/aggregator.py \
            DOE/batch.py \
            DOE/compiler.py \
            DOE/generator.py \
            DOE/run_doe.py \
            DOE/sampler.py \
            DOE/search.py \
            --ignore-missing-imports \
            --no-strict-optional
