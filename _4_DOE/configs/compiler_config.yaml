# DOE compiler configuration
# To add a new standard: uncomment or add a block under `standards`.
# No Python changes required.

boblib_path: ../../_0_Utils/external/BobLib/package.mo

# Number of variants to compile in parallel.
# Each worker runs a separate OMC process.
# OMC itself is already multithreaded, so don't set this too high.
# 2-4 is a good starting point on a laptop, more on TACC.
max_workers: 4

standards:
  ISO4138:
    model: BobLib.Standards.ISO4138
    start_time: 0
    stop_time: 100
    intervals: 0
    tolerance: 1e-6
    solver: dassl

  # KnC_Fr:
  #   model: BobLib.Standards.FrKnC
  #   start_time: 0
  #   stop_time: 91
  #   intervals: 0
  #   tolerance: 1e-6
  #   solver: dassl

  # KnC_Rr:
  #   model: BobLib.Standards.RrKnC
  #   start_time: 0
  #   stop_time: 91
  #   intervals: 0
  #   tolerance: 1e-6
  #   solver: dassl

batch:
  max_workers: 4
  timeout: 300
