standard: ISO4138

simulation:
  backend: modelica
  build_dir: _2_StandardSim/Build
  exec_name: BobLib.Standards.VehicleModel

  stop_time: 10.0
  solver: dassl
  output_format: csv

  log_level: LOG_STDOUT,LOG_ASSERT,LOG_STATS

  variable_filter: "time|handwheelAngle|leftSteerAngle|rightSteerAngle|accY|roll|sideslip|handwheelTorque|velX|velY|yawVel"

  no_grid: true
  no_event_emit: false
  no_equidistant_output_frequency: false

execution:
  parallel: true
  max_workers: 8
  cleanup: false
  stream_logs: false

sweep:
  testVel: 15.0
  n_cases: 10
  r_min: 12.5
  r_max: 100.0
  radius_bias_power: 2.5

controller:
  curv_kp: 3
  curv_ti: 0.02

  vel_kp: 200.0
  vel_ti: 1.0

fit:
  ay_linear_max: 6.0

report:
  enabled: true
  brand: BobSim
  title: ISO4138 Vehicle Characterization
  subtitle: OpenModelica Executable with Modelica PI Control
  output_path: _2_StandardSim/results/iso4138_report.pdf

  notes:
    - ISO4138 steady-state circular test performed
    - Constant velocity maintained at 15 m/s
    - Radius sweep from 12.5 m to 100 m
    - Tire model: MF52
    - Configuration: baseline_v3
    - Backend: OpenModelica executable

plots:

  steering:
    layout: dual
    title: "Steering Behavior vs $a_y$"

    subplots:

      - title: "Roadwheel Angle $\\delta$"
        style: line
        fit: false
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: roadwheel, label: "$\\delta$ (rad)" }

      - title: "Curvature Tracking Error"
        style: scatter
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: curvature_error_pct, label: "$\\Delta \\kappa / \\kappa_{cmd} \\times 100$ (%)" }

  vehicle_states:
    layout: triple
    title: "Vehicle States vs $a_y$"

    subplots:

      - title: "Curvature $\\kappa$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: curvature, label: "$\\kappa$ (1/m)" }

      - title: "Roll Angle $\\phi$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: roll, label: "$\\phi$ (rad)" }

      - title: "Sideslip $\\beta$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: sideslip, label: "$\\beta$ (rad)" }

  sensitivities:
    layout: triple
    title: "Response Sensitivities vs $a_y$"

    subplots:

      - title: "$d\\kappa/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: curvature_gradient, label: "$d\\kappa/da_y$" }

      - title: "$d\\phi/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: roll_gradient, label: "$d\\phi/da_y$" }

      - title: "$d\\beta/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: sideslip_gradient, label: "$d\\beta/da_y$" }

  steering_effort:
    layout: dual
    title: "Steering Effort vs $a_y$"

    subplots:

      - title: "Steering Torque $T_{sw}$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: torque, label: "$T_{sw}$ (Nm)" }

      - title: "Steering Sensitivity $d\\delta/da_y$"
        x: { key: ay_signed, label: "$a_y$ $(m/s^2)$" }
        y: { key: steer_gradient, label: "$d\\delta/da_y$" }